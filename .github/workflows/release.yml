name: Release (PyPI)
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─── Linux (manylinux, glibc) ────────────────────────────────────────────────
  linux:
    name: Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          sccache: "true"
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # ─── Linux (musllinux, Alpine) ───────────────────────────────────────────────
  musllinux:
    name: musllinux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: musllinux_1_2
          sccache: "true"
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist

  # ─── Windows (x64) ───────────────────────────────────────────────────────────
  windows:
    name: Windows (py${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.14 dropped: maturin produces a Windows wheel with trailing data
        # that PyPI rejects (ZIP validation). Re-add once maturin ships a fix.
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - uses: PyO3/maturin-action@v1
        with:
          sccache: "true"
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.python-version }}
          path: dist

  # ─── macOS (Apple Silicon, arm64) ───────────────────────────────────────────
  macos:
    name: macOS (arm64, py${{ matrix.python-version }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        # No CPython 3.9 build for arm64 on hosted runners → start at 3.10.
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: PyO3/maturin-action@v1
        with:
          sccache: "true"
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-arm64-${{ matrix.python-version }}
          path: dist

  # ─── Source distribution ─────────────────────────────────────────────────────
  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist

  # ─── Publish ─────────────────────────────────────────────────────────────────
  publish:
    name: Publish (${{ github.event_name == 'release' && 'PyPI' || 'TestPyPI' }})
    runs-on: ubuntu-latest
    needs: [linux, musllinux, windows, macos, sdist]
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          skip-existing: true

      - name: Publish to PyPI
        if: github.event_name == 'release'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
