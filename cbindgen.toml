language = "C"
cpp_compat = true   # wrap declarations in extern "C" so C++ consumers can link them
include_guard = "CURVEPRESS_H"
autogen_warning = "/* AUTO-GENERATED by cbindgen — do not edit */"
include_version = true
tab_width = 4
documentation = true

[parse]
parse_deps = false

[export]
include = ["CpConfig", "CpStats"]
# No prefix: the C++ wrapper (curvepress.hpp) uses unprefixed names (CpStats,
# CP_ERR_*). The functions already carry the cp_ prefix in their Rust names,
# and [fn] prefix = "" keeps them as-is. A "cp_" export prefix would wrongly
# rename the struct/constants to cp_CpStats / cp_CP_ERR_* and break the wrapper.

[fn]
prefix = ""
postfix = ""
args = "auto"
